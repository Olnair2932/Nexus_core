services:
  - type: web
    name: nexus-core
    env: node

    buildCommand: |
      echo "NEXUS BUILD TEST"
      npm install
      apt-get update && apt-get install -y deno
      deno --version

    startCommand: npm start

    envVars:
      - key: PORT
        value: 10000

      - key: PATH
        value: /usr/local/bin:/usr/bin:/bin
