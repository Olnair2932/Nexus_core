<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Feed</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
}

.top{
position:fixed;
top:0;
left:0;
width:100%;
background:#111;
padding:15px;
z-index:20;
display:flex;
gap:15px;
align-items:center;
}

button{
background:#00f2ff;
border:0;
padding:10px;
border-radius:10px;
cursor:pointer;
}

.feed{
padding-top:70px;
}

.card{
margin:20px;
background:#111;
border-radius:20px;
overflow:hidden;
}

video{
width:100%;
height:70vh;
object-fit:cover;
background:#222;
}

.info{
padding:15px;
}


#painel{

display:none;

position:fixed;
top:70px;
right:10px;

width:90%;
max-width:400px;

height:70vh;

overflow:auto;

background:#111;

border-radius:20px;

padding:20px;

z-index:30;

}


.item{

background:#222;
padding:10px;
margin:10px 0;
border-radius:10px;

}


.item button{

background:red;
color:white;

}


</style>

</head>


<body>


<div class="top">

<button onclick="abrirPainel()">
Gerenciar vídeos
</button>


<strong>
Nexus Feed
</strong>


</div>



<div id="feedVideos" class="feed">

</div>



<div id="painel">


<h3>
Upload Cloudinary
</h3>


<input 
id="arquivo"
type="file"
accept="video/*"
>


<br><br>


<button onclick="enviarVideo()">
Enviar vídeo
</button>


<hr>


<h3>
Lista de vídeos
</h3>


<div id="lista">

</div>


<button onclick="fecharPainel()">
Fechar
</button>


</div>




<script>


async function carregarFeed(){


const feed=document.getElementById("feedVideos");


try{


const resposta=await fetch("/api/videos");

const videos=await resposta.json();



feed.innerHTML="";



videos.reverse().forEach(video=>{


feed.innerHTML+=`

<div class="card">


<video controls playsinline>

<source src="${video.url}">

</video>


<div class="info">

<h3>
${video.titulo || "Vídeo Nexus"}
</h3>


<button onclick="telaCheia(this)">
Tela cheia
</button>


</div>


</div>


`;


});



}catch(e){


feed.innerHTML="Erro ao carregar vídeos";


}


}




function telaCheia(botao){


const video=
botao.closest(".card")
.querySelector("video");


if(video.requestFullscreen){

video.requestFullscreen();

}


}




function abrirPainel(){

document.getElementById("painel").style.display="block";

carregarLista();

}



function fecharPainel(){

document.getElementById("painel").style.display="none";

}




async function enviarVideo(){


const arquivo=
document.getElementById("arquivo").files[0];


if(!arquivo){

alert("Escolha um vídeo");

return;

}



const dados=new FormData();


dados.append("video",arquivo);



try{


const resposta=
await fetch("/api/videos/upload",{

method:"POST",

body:dados

});



const resultado=
await resposta.json();



if(resultado.sucesso){

alert("Upload concluído");

document.getElementById("arquivo").value="";

carregarFeed();

carregarLista();


}else{


alert(resultado.erro || "Erro no upload");


}



}catch(e){


alert("Falha no envio");


}



}





async function carregarLista(){


const lista=document.getElementById("lista");


try{


const resposta=
await fetch("/api/videos");


const videos=
await resposta.json();



lista.innerHTML="";



videos.forEach(video=>{


lista.innerHTML+=`

<div class="item">


<strong>
${video.titulo || "Vídeo"}
</strong>


<br>


<small>
Cloudinary ativo
</small>


<br>


<button onclick="abrirVideo('${video.url}')">

Abrir vídeo

</button>


</div>


`;


});



}catch(e){


lista.innerHTML="Erro na lista";


}



}




function abrirVideo(url){

window.open(url,"_blank");

}




carregarFeed();


</script>


</body>
</html>
