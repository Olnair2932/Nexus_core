<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Feed</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial, sans-serif;
}

.top{
    position:fixed;
    top:0;
    width:100%;
    background:#111;
    padding:15px;
    z-index:10;
}

.top button{
    background:#00f2ff;
    border:none;
    padding:8px 15px;
    border-radius:10px;
}

.feed{
    padding-top:70px;
}

.card{
    margin:20px;
    background:#111;
    border-radius:20px;
    overflow:hidden;
}

video{
    width:100%;
    height:70vh;
    background:#222;
    object-fit:cover;
}

.info{
    padding:15px;
}

.action{
    font-size:22px;
    margin-right:15px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="top">
<button onclick="history.back()">← Nexus</button>
<strong>Nexus Feed 🎬</strong>
</div>



<div class="feed" id="feedVideos">

<div class="card">

<video controls>
</video>

<div class="info">

<h3>
Usuário Nexus
</h3>

<p>
Título do vídeo
</p>

<span class="action" onclick="curtirVideo('${videoId}')">
${curtiu ? "💙" : "🤍"} ${curtidas || 0}
</span>

<span class="action">💬 0</span>

<span class="action" onclick="salvarFavorito('${video.id || video.public_id}')">⭐</span>

<span class="action"
onclick="document.querySelector('video').requestFullscreen()">
⛶
</span>

</div>

</div>

</div>



<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCTX4Bgjd7T0WV_KkHnJm7Tgk3CodyO6dM",
  authDomain: "nexus-core-42ebb.firebaseapp.com",
  databaseURL: "https://nexus-core-42ebb-default-rtdb.firebaseio.com",
  projectId: "nexus-core-42ebb",
  storageBucket: "nexus-core-42ebb.firebasestorage.app",
  messagingSenderId: "733318174781",
  appId: "1:733318174781:web:979c38a62c1c5620b17254"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const auth = firebase.auth();

auth.onAuthStateChanged(user => {

    const usuario = document.querySelector('.info h3');

    if(user){
        usuario.innerText = user.displayName || "Usuário Nexus";
    } else {
        usuario.innerText = "Usuário Nexus";
    }

});
</script>


<script>
async function carregarFeedVideos(){

    const feed = document.getElementById("feedVideos");

    try{
        const resposta = await fetch("/api/videos");
        const videos = await resposta.json();

        if(!videos.length){
            feed.innerHTML = "Nenhum vídeo disponível.";
            return;
        }

        const user = firebase.auth().currentUser;

        const cards = await Promise.all(
            videos.map(async video => {

                const videoId = video.id || video.public_id;
                let favorito = false;
                let curtiu = false;
                let curtidas = 0;

                const snapCurtidas = await db
                    .ref(`feed_curtidas/${videoId}`)
                    .once("value");

                if(snapCurtidas.exists()){
                    curtidas = Object.keys(snapCurtidas.val()).length;
                }

                if(user){
                    const snap = await db
                        .ref(`feed_favoritos/${videoId}/${user.uid}`)
                        .once("value");

                    favorito = snap.exists();

                    const snapCurtiu = await db
                        .ref(`feed_curtidas/${videoId}/${user.uid}`)
                        .once("value");

                    curtiu = snapCurtiu.exists();
                }

                return `
            <div class="card">
                <video controls playsinline>
                    <source src="${video.url}">
                </video>

                <div class="info">
                    <h3>${video.titulo}</h3>

                    <span class="action" onclick="curtirVideo('${videoId}')">
${curtiu ? "💙" : "🤍"} ${curtidas || 0}
</span>
                    <span class="action">💬 0</span>

                    <span class="action"
                    onclick="salvarFavorito('${videoId}')">
                    ${favorito ? "⭐" : "☆"}
                    </span>

                    <span class="action"
                    onclick="this.closest('.card').querySelector('video').requestFullscreen()">
                    ⛶
                    </span>
                </div>
            </div>
                `;
            })
        );

        feed.innerHTML = cards.join("");

    }catch(erro){

        console.error("Erro carregando Feed:", erro);
        feed.innerHTML = "Erro ao carregar vídeos.";

    }

}




async function carregarFavoritosFeed(){

    const lista = document.getElementById("feed-favoritos-list");

    const user = firebase.auth().currentUser;

    if(!user){
        lista.innerHTML = "Faça login para ver favoritos.";
        return;
    }

    try{

        const snap = await db
            .ref("feed_favoritos")
            .once("value");

        const dados = snap.val() || {};

        const meusIds = Object.keys(dados)
            .filter(id => dados[id][user.uid]);

        const resposta = await fetch("/api/videos");
        const videos = await resposta.json();

        const favoritos = videos.filter(video =>
            meusIds.includes(video.id || video.public_id)
        );

        lista.innerHTML =
            favoritos.map(video => `
                <div class="card">
                    <video controls playsinline>
                        <source src="${video.url}">
                    </video>

                    <div class="info">
                        <h3>${video.titulo}</h3>

                        <span class="action"
                        onclick="salvarFavorito('${video.id || video.public_id}')">
                        ⭐
                        </span>
                    </div>
                </div>
            `).join("")
            || "Nenhum favorito salvo.";

    }catch(e){

        console.error("Erro favoritos Feed:", e);
        lista.innerHTML = "Erro carregando favoritos.";

    }

}


async function curtirVideo(videoId){

    const user = firebase.auth().currentUser;

    if(!user){
        alert("Faça login para curtir");
        return;
    }

    const ref = db.ref(`feed_curtidas/${videoId}/${user.uid}`);

    const snap = await ref.once("value");

    if(snap.exists()){
        await ref.remove();
    } else {
        await ref.set(true);
    }

    carregarFeedVideos();
}

async function salvarFavorito(videoId){

    const user = firebase.auth().currentUser;

    console.log("Usuário:", user);
    console.log("Vídeo:", videoId);

    if(!user){
        alert("Faça login para favoritar");
        return;
    }

    try{

        const ref = db.ref(
            `feed_favoritos/${videoId}/${user.uid}`
        );

        const snapshot = await ref.once("value");

        if(snapshot.exists()){
            await ref.remove();
            console.log("Favorito removido");
            alert("☆ Favorito removido");
        }else{
            await ref.set(true);
            console.log("Favorito salvo");
            alert("⭐ Favorito salvo");
        }

    }catch(e){

        console.error("Erro ao salvar favorito:", e);
        alert("Erro: " + e.message);

    }
}

firebase.auth().onAuthStateChanged(async (user) => {
    await carregarFeedVideos();

    if(user){
        await carregarFavoritosFeed();
    }
});
</script>


<div id="feed-favoritos" style="margin:20px;">
<h3>⭐ Meus Favoritos</h3>
<div id="feed-favoritos-list"></div>
</div>

</body>
</html>
