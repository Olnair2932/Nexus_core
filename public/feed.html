<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Feed</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
}

.top{
    position:fixed;
    top:0;
    width:100%;
    background:#111;
    padding:15px;
    z-index:20;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    background:#00f2ff;
    border:0;
    padding:8px 15px;
    border-radius:10px;
    cursor:pointer;
}

.feed{
    padding-top:70px;
}

.card{
    margin:20px;
    background:#111;
    border-radius:20px;
    overflow:hidden;
}

video{
    width:100%;
    height:70vh;
    background:#222;
    object-fit:cover;
}

.info{
    padding:15px;
}

.acoes{
    padding:10px 15px;
    border-top:1px solid #333;
}

.acao{
    color:#00f2ff;
    cursor:pointer;
    margin-right:20px;
}

.comentarios{
    padding:15px;
}

.comentarios input{
    width:70%;
    padding:10px;
    border-radius:10px;
    border:0;
}

.comentarios button{
    margin-left:5px;
}

.comentario{
    margin-top:8px;
    color:#ddd;
}

.painel{
    display:none;
    position:fixed;
    top:60px;
    right:10px;
    width:90%;
    max-height:80vh;
    overflow:auto;
    background:#111;
    border-radius:20px;
    padding:20px;
    z-index:30;
}

.videoLista{
    border-bottom:1px solid #333;
    padding:10px;
}

.fechar{
    background:#444;
    color:white;
}
</style>

</head>

<body>

<div class="top">
<strong>Nexus Feed</strong>
<button onclick="abrirGerenciador()">Gerenciar vídeos</button>
</div>

<div id="gerenciador" class="painel">

<h3>Upload Cloudinary</h3>

<input type="file" id="videoUpload" accept="video/*">

<button onclick="uploadCloudinary()">
Enviar vídeo
</button>

<h3>Lista de vídeos</h3>

<div id="listaVideos"></div>

<button class="fechar" onclick="fecharGerenciador()">
Fechar
</button>

</div>


<div class="feed" id="feedVideos"></div>


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyCTX4Bgjd7T0WV_KkHnJm7Tgk3CodyO6dM",
authDomain:"nexus-core-42ebb.firebaseapp.com",
databaseURL:"https://nexus-core-42ebb-default-rtdb.firebaseio.com",
projectId:"nexus-core-42ebb",
storageBucket:"nexus-core-42ebb.firebasestorage.app",
messagingSenderId:"733318174781",
appId:"1:733318174781:web:979c38a62c1c5620b17254"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

async function carregarFeedVideos(){

const feed=document.getElementById("feedVideos");

try{

const resposta=await fetch("/api/videos");

const videos=await resposta.json();


if(!videos.length){

feed.innerHTML="Nenhum vídeo disponível.";

return;

}


const user=firebase.auth().currentUser;


let html="";


for(const video of videos){


const id=video.id;


let curtidas=0;

let curtido=false;


const likes=await db
.ref("feed_curtidas/"+id)
.once("value");


if(likes.exists()){

curtidas=Object.keys(likes.val()).length;

}


if(user){

const meuLike=await db
.ref("feed_curtidas/"+id+"/"+user.uid)
.once("value");


curtido=meuLike.exists();

}



const comentarios=await db
.ref("feed_comentarios/"+id)
.once("value");


let listaComentarios="";


if(comentarios.exists()){

Object.values(comentarios.val()).forEach(c=>{

listaComentarios+=`

<div class="comentario">
${c.texto}
</div>

`;

});

}else{

listaComentarios="Nenhum comentário";

}



html+=`

<div class="card">


<video controls playsinline>

<source src="${video.url}">

</video>


<div class="acoes">


<span class="acao"
onclick="curtirVideo('${id}')">

${curtido ? "Curtido" : "Curtir"} ${curtidas}

</span>


</div>



<div class="comentarios">


<div>

Comentar

</div>


<input 
id="comentario_${id}"
placeholder="Digite seu comentário">


<button onclick="comentar('${id}')">

Enviar

</button>



<div>

Comentários

</div>


${listaComentarios}


</div>



<div class="info">

<h3>
${video.titulo || "Vídeo Nexus"}
</h3>


<span class="acao"
onclick="telaCheia(this)">

Tela cheia

</span>


</div>


</div>

`;

}


feed.innerHTML=html;


}catch(e){

console.error(e);

feed.innerHTML="Erro ao carregar vídeos.";

}

}




async function curtirVideo(id){


const user=firebase.auth().currentUser;


if(!user){

alert("Faça login para curtir");

return;

}



const ref=db.ref(
"feed_curtidas/"+id+"/"+user.uid
);



const snap=await ref.once("value");



if(snap.exists()){

await ref.remove();

}else{

await ref.set(true);

}



carregarFeedVideos();


}




async function comentar(id){


const campo=document.getElementById(
"comentario_"+id
);


const texto=campo.value.trim();


if(!texto){

return;

}



const novo=db
.ref("feed_comentarios/"+id)
.push();



await novo.set({

texto:texto,

data:Date.now()

});


campo.value="";


carregarFeedVideos();


}




function telaCheia(elemento){


const video=elemento
.closest(".card")
.querySelector("video");


if(video.requestFullscreen){

video.requestFullscreen();

}else if(video.webkitEnterFullscreen){

video.webkitEnterFullscreen();

}


}



async function abrirGerenciador(){


document.getElementById(
"gerenciador"
).style.display="block";


carregarListaCloudinary();


}



function fecharGerenciador(){


document.getElementById(
"gerenciador"
).style.display="none";


}



async function carregarListaCloudinary(){


const div=document.getElementById(
"listaVideos"
);


try{


const resposta=await fetch("/api/videos");


const videos=await resposta.json();


let html="";


videos.forEach(video=>{


html+=`

<div class="videoLista">

<strong>
${video.titulo}
</strong>


<br>

Cloudinary ativo


<br>

<a href="${video.url}" target="_blank">

Abrir vídeo

</a>


</div>

`;

});


div.innerHTML=html;


}catch(e){


div.innerHTML="Erro ao carregar lista";


}


}



async function uploadCloudinary(){


const arquivo=document
.getElementById("videoUpload")
.files[0];


if(!arquivo){

alert("Escolha um vídeo");

return;

}



const dados=new FormData();


dados.append(
"video",
arquivo
);



const resposta=await fetch(
"/api/videos/upload",
{

method:"POST",

body:dados

}
);



const resultado=await resposta.json();



if(resultado.sucesso){


alert("Upload concluído");


carregarListaCloudinary();


carregarFeedVideos();


}else{


alert(resultado.erro || "Erro no upload");


}


}


firebase.auth()
.onAuthStateChanged(()=>{


carregarFeedVideos();


});


</script>
