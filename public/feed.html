<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Feed</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial, sans-serif;
}

.top{
    position:fixed;
    top:0;
    width:100%;
    background:#111;
    padding:15px;
    z-index:10;
}

.top button{
    background:#00f2ff;
    border:none;
    padding:8px 15px;
    border-radius:10px;
}

.feed{
    padding-top:70px;
}

.card{
    margin:20px;
    background:#111;
    border-radius:20px;
    overflow:hidden;
}

video{
    width:100%;
    height:70vh;
    background:#222;
    object-fit:cover;
}

.info{
    padding:15px;
}

.action{
    font-size:22px;
    margin-right:15px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="top">
<button onclick="history.back()">← Nexus</button>
<strong>Nexus Feed 🎬</strong>
</div>


<div class="feed">

<div class="card">

<video controls>
</video>

<div class="info">

<h3>
Usuário Nexus
</h3>

<p>
Título do vídeo
</p>

<span class="action">❤️ 0</span>

<span class="action">💬 0</span>

<span class="action">⭐</span>

<span class="action"
onclick="document.querySelector('video').requestFullscreen()">
⛶
</span>

</div>

</div>

</div>



<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCTX4Bgjd7T0WV_KkHnJm7Tgk3CodyO6dM",
  authDomain: "nexus-core-42ebb.firebaseapp.com",
  databaseURL: "https://nexus-core-42ebb-default-rtdb.firebaseio.com",
  projectId: "nexus-core-42ebb",
  storageBucket: "nexus-core-42ebb.firebasestorage.app",
  messagingSenderId: "733318174781",
  appId: "1:733318174781:web:979c38a62c1c5620b17254"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

auth.onAuthStateChanged(user => {

    const usuario = document.querySelector('.info h3');

    if(user){
        usuario.innerText = user.displayName || "Usuário Nexus";
    } else {
        usuario.innerText = "Usuário Nexus";
    }

});
</script>

</body>
</html>
