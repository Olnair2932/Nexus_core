<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXUS | COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- SDKs FIREBASE COMPAT -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #05070a; --accent: #00f2ff; --panel: rgba(16, 20, 28, 0.9); --text: #c4d1d9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); background: rgba(0,0,0,0.8); }
        header h1 { font-family: 'Orbitron'; font-size: 14px; color: var(--accent); text-transform: uppercase; }

        #user-profile { display: flex; align-items: center; gap: 8px; }
        #user-img { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--accent); display: none; }
        .btn-auth { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 4px 10px; border-radius: 12px; cursor: pointer; font-size: 11px; font-weight: bold; }

        main { flex: 1; display: flex; flex-direction: column; padding: 10px; gap: 10px; overflow: hidden; }

        .tabs { display: flex; gap: 5px; margin-bottom: -5px; }
        .tab-btn { background: var(--panel); border: 1px solid #1a202c; border-bottom: none; color: #718096; padding: 5px 12px; border-radius: 8px 8px 0 0; font-size: 11px; cursor: pointer; }
        .tab-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0,242,255,0.05); }

        .list-container { background: var(--panel); border: 1px solid #1a202c; border-radius: 0 12px 12px 12px; padding: 10px; height: 180px; display: flex; flex-direction: column; }
        #item-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }

        .list-item { background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 6px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid transparent; }
        .list-item:hover { border-left-color: var(--accent); }
        .item-actions { display: flex; gap: 10px; align-items: center; }
        .btn-star { color: #4a5568; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-star.active { color: #ffcc00; text-shadow: 0 0 5px #ffcc00; }
        .status-tag { font-size: 9px; padding: 2px 5px; border-radius: 4px; }

        .chat-zone { flex: 1; background: var(--panel); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        #history { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 85%; padding: 10px; border-radius: 10px; font-size: 14px; line-height: 1.4; }
        .user { align-self: flex-end; background: #2563eb; }
        .ai { align-self: flex-start; background: #161b2c; border-left: 3px solid var(--accent); }

        .nexus-player { background: #000; padding: 10px; border-top: 1px solid var(--accent); }
        #track-info { font-family: 'Orbitron'; font-size: 9px; color: var(--accent); text-align: center; margin-bottom: 5px; }
        audio { width: 100%; height: 30px; filter: invert(1) hue-rotate(180deg); }

        footer { padding: 10px; background: #0d1117; display: flex; gap: 10px; }
        input { flex: 1; background: #1a202c; border: 1px solid #2d3748; border-radius: 20px; padding: 10px 15px; color: white; outline: none; }
        button#send-btn { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    </style>

<script src="https://www.youtube.com/iframe_api"></script>

</head>
<body>
    <header>
        <h1>NEXUS CORE</h1>
        <div id="user-profile">
            <img id="user-img" src="" alt="">
            <button id="auth-btn" class="btn-auth" onclick="toggleLogin()">LOGIN GOOGLE</button>
        </div>
    </header>

    <main>
        <div class="tabs">
            <button id="tab-lib" class="tab-btn active" onclick="switchTab('lib')">BIBLIOTECA RENDER</button>
            <button id="tab-fav" class="tab-btn" onclick="switchTab('fav')">MINHA PLAYLIST (☁️)</button>
        </div>
        <div class="list-container">
            <div id="item-list">Iniciando sistemas...</div>
        </div>

        <div class="chat-zone">
            <div id="history"><div class="bubble ai">Núcleo NEXUS MASTER ONLINE - Sincronizado.</div></div>
        </div>
    </main>

    <div class="nexus-player">
        <div id="track-info">STANDBY</div>
        <audio id="nexusPlayer" controls style="width:100%;height:30px"></audio>
<div id="youtubePlayer" style="display:none;width:100%;height:180px;"></div>

    </div>

    <footer>
        <input id="in" type="text" placeholder="Digite seu comando..." autocomplete="off">
        <button id="send-btn" onclick="send()">➤</button>
    </footer>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCTX4Bgjd7T0WV_KkHnJm7Tgk3CodyO6dM",
          authDomain: "nexus-core-42ebb.firebaseapp.com",
          databaseURL: "https://nexus-core-42ebb-default-rtdb.firebaseio.com",
          projectId: "nexus-core-42ebb",
          storageBucket: "nexus-core-42ebb.firebasestorage.app",
          messagingSenderId: "733318174781",
          appId: "1:733318174781:web:979c38a62c1c5620b17254"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let user = null;
        let currentTab = 'lib';

        async function toggleLogin() {
            if (!user) {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
            } else {
                await auth.signOut();
                location.reload();
            }
        }

        auth.onAuthStateChanged(u => {
            user = u;
            const btn = document.getElementById('auth-btn');
            const img = document.getElementById('user-img');
            if (u) {
                btn.innerText = "SAIR";
                img.src = u.photoURL; img.style.display = "block";
            }
        });

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tab-lib').className = t === 'lib' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tab-fav').className = t === 'fav' ? 'tab-btn active' : 'tab-btn';
            t === 'lib' ? loadLibrary() : loadPlaylist();
        }

        async function loadLibrary() {
            try {
                const r = await fetch('/api/arquivos');
                const files = await r.json();
                document.getElementById('item-list').innerHTML = files.map(f => `
                    <div class="list-item">
                        <span onclick="copyCmd('${f}')">${f}</span>
                        <div class="item-actions">
                            <span class="btn-star" onclick="addToDB('${f}')">★</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) { document.getElementById('item-list').innerText = "Erro ao ler Render."; }
        }

        async function loadPlaylist() {
            if (!user) {
                document.getElementById('item-list').innerHTML = "<div style='text-align:center; padding:20px;'>Faça login.</div>";
                return;
            }

            // Pega arquivos no disco para comparar
            const r = await fetch('/api/arquivos');
            const localFiles = await r.json();

            db.ref(`playlists/${user.uid}`).on('value', snapshot => {
                const data = snapshot.val();
                if (!data) {
                    document.getElementById('item-list').innerHTML = "<div style='text-align:center; padding:20px;'>Vazia.</div>";
                    return;
                }
                const items = Object.values(data).filter((item, index, self) => index === self.findIndex(x => x.name === item.name));
                document.getElementById('item-list').innerHTML = items.map(item => {
                    const isLocal = localFiles.some(f => f.toLowerCase().includes(item.name.toLowerCase()));
                    return `
                        <div class="list-item" style="${isLocal ? '' : 'opacity: 0.7;'}">
                            <span onclick="copyCmd('${item.name}')">${item.name}</span>
                            <div class="item-actions">
                                <span class="status-tag" style="background: ${isLocal ? '#00f2ff22' : '#ff444422'}; color: ${isLocal ? '#00f2ff' : '#ff4444'};">
                                    ${isLocal ? 'DISCO' : 'NUVEM'}
                                </span>
                                <span class="btn-star active">★</span>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        function copyCmd(name) {
            document.getElementById('in').value = `tocar ${name}`;
            document.getElementById('in').focus();
        }

        async function addToDB(name) {
            if (!user) return addMsg("Login necessário!", 'ai');
            await db.ref(`playlists/${user.uid}/${name.replace(/[.#$\[\]\/]/g,'_')}`).set({
                name: name,
                url: "/" + encodeURIComponent(name),
                date: Date.now()
            });
            addMsg(`⭐ ${name} salva no Firebase!`, 'ai');
        }

        async function send() {
            const input = document.getElementById('in');
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, 'user'); input.value = "";

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto: val, uid: user ? user.uid : null })
                });
                const data = await response.json();
                addMsg(data.nexus, 'ai');
                if(data.url) {

                    document.getElementById('track-info').innerText =
                        data.fonte.toUpperCase() + " : " +
                        decodeURIComponent(data.url).split('/').pop();

                    const p = document.getElementById('nexusPlayer');

                    p.src = data.url;
                    p.load();
                    p.play().catch(()=>{});

                } else if(data.fonte) {

                    document.getElementById('track-info').innerText =
                        data.fonte.toUpperCase() + " : RESULTADO EXTERNO";

                }
                setTimeout(() => currentTab === 'lib' ? loadLibrary() : loadPlaylist(), 2000);
            } catch (e) { addMsg("Erro de conexão.", 'ai'); }
        }

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `bubble ${type}`;
            div.innerText = text;
            const h = document.getElementById('history');
            h.appendChild(div); h.scrollTop = h.scrollHeight;
        }

        document.getElementById('in').onkeydown = (e) => { if(e.key === 'Enter') send(); };
        loadLibrary();
    </script>
</body>
</html>
