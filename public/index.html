<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXUS | COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --accent: #00f2ff; --panel: rgba(16, 20, 28, 0.9); --text: #c4d1d9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); background: rgba(0,0,0,0.8); }
        header h1 { font-family: 'Orbitron'; font-size: 14px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }

        main { flex: 1; display: flex; flex-direction: column; padding: 10px; gap: 10px; overflow: hidden; }

        /* BIBLIOTECA */
        .library-box { background: var(--panel); border: 1px solid #1a202c; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; height: 160px; }
        .library-title { font-family: 'Orbitron'; font-size: 10px; color: var(--accent); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        #file-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .file-item { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 6px; font-size: 13px; cursor: pointer; border-left: 3px solid transparent; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-item:hover { border-left: 3px solid var(--accent); background: rgba(0, 242, 255, 0.1); }

        /* CHAT */
        .chat-zone { flex: 1; background: var(--panel); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        #history { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 85%; padding: 12px; border-radius: 12px; font-size: 15px; line-height: 1.4; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #161b2c; border-left: 4px solid var(--accent); border-bottom-left-radius: 2px; }

        /* PLAYER */
        .nexus-player { background: #000; padding: 12px; border-top: 1px solid var(--accent); }
        #track-name { font-family: 'Orbitron'; font-size: 9px; color: var(--accent); text-align: center; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        audio { width: 100%; height: 35px; filter: invert(1) hue-rotate(180deg) brightness(1.5); }

        /* INPUT */
        footer { padding: 12px; background: #0d1117; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: #1a202c; border: 1px solid #2d3748; border-radius: 25px; padding: 12px 20px; color: white; outline: none; font-size: 16px; }
        button { background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        button svg { fill: #000; width: 20px; height: 20px; }
    </style>
</head>
<body>
    <header><h1>NEXUS SENTINELA CORE</h1></header>
    
    <main>
        <div class="library-box">
            <div class="library-title">
                <span>📂 BIBLIOTECA NO RENDER</span>
                <span id="count" style="background: var(--accent); color: #000; padding: 2px 8px; border-radius: 10px;">0</span>
            </div>
            <div id="file-list">Sincronizando biblioteca...</div>
        </div>

        <div class="chat-zone">
            <div id="history">
                <div class="bubble ai">Núcleo Nexus Master carregado. Aguardando comando.</div>
            </div>
        </div>
    </main>

    <div class="nexus-player">
        <div id="track-name">SISTEMA EM STANDBY</div>
        <audio id="nexusPlayer" controls></audio>
    </div>

    <footer>
        <input id="in" type="text" placeholder="Digite seu comando..." autocomplete="off">
        <button onclick="send()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </footer>

    <script>
        const history = document.getElementById('history');
        const player = document.getElementById('nexusPlayer');
        const trackName = document.getElementById('track-name');
        const fileList = document.getElementById('file-list');
        const inputField = document.getElementById('in');

        async function loadFiles() {
            try {
                const r = await fetch('/api/arquivos');
                const files = await r.json();
                document.getElementById('count').innerText = files.length;
                fileList.innerHTML = files.length === 0 ? 
                    "<div style='font-size:12px; opacity:0.5; text-align:center;'>Nenhum arquivo encontrado.</div>" :
                    files.map(f => `<div class="file-item" onclick="copyToInput('${f}')">${f}</div>`).join('');
            } catch { fileList.innerHTML = "Erro ao carregar arquivos."; }
        }

        function copyToInput(name) {
            inputField.value = `tocar ${name}`;
            inputField.focus();
        }

        async function send() {
            const val = inputField.value.trim();
            if(!val) return;
            addMsg(val, 'user');
            inputField.value = "";

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto: val })
                });
                const data = await response.json();
                addMsg(data.nexus, 'ai');

                if(data.url) {
                    trackName.innerText = "PLAYING: " + decodeURIComponent(data.url).split('/').pop();
                    player.src = data.url;
                    player.play();
                }
                setTimeout(loadFiles, 3000); 
            } catch (err) { addMsg("❌ Falha na conexão com o Core.", 'ai'); }
        }

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `bubble ${type}`;
            div.innerText = text;
            history.appendChild(div);
            history.scrollTop = history.scrollHeight;
        }

        inputField.onkeydown = (e) => { if(e.key === 'Enter') send(); };
        setInterval(loadFiles, 15000);
        loadFiles();
    </script>
</body>
</html>
