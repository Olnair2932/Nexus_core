    <style>

        .nexus-player { background: #000; padding: 10px; border-top: 1px solid var(--accent); }
        #track-info { font-family: 'Orbitron'; font-size: 9px; color: var(--accent); text-align: center; margin-bottom: 5px; }
        audio { width: 100%; height: 30px; filter: invert(1) hue-rotate(180deg); }

        footer { padding: 10px; background: #0d1117; display: flex; gap: 10px; }

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCTX4Bgjd7T0WV_KkHnJm7Tgk3CodyO6dM",
          authDomain: "nexus-core-42ebb.firebaseapp.com",
          databaseURL: "https://nexus-core-42ebb-default-rtdb.firebaseio.com",
          projectId: "nexus-core-42ebb",
          storageBucket: "nexus-core-42ebb.firebasestorage.app",
          messagingSenderId: "733318174781",
          appId: "1:733318174781:web:979c38a62c1c5620b17254"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let user = null;
        let currentTab = 'lib';

        async function toggleLogin() {
            if (!user) {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
            } else {
                await auth.signOut();
                location.reload();
            }
        }

        auth.onAuthStateChanged(u => {
            user = u;
            const btn = document.getElementById('auth-btn');
            const img = document.getElementById('user-img');
            if (u) {
                btn.innerText = "SAIR";
                img.src = u.photoURL; img.style.display = "block";
            }
        });

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tab-lib').className = t === 'lib' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tab-fav').className = t === 'fav' ? 'tab-btn active' : 'tab-btn';
document.getElementById('tab-cloud').className = t === 'cloud' ? 'tab-btn active' : 'tab-btn';
document.getElementById('tab-youtube').className = t === 'youtube' ? 'tab-btn active' : 'tab-btn';
            if (t === 'lib') loadLibrary();
else if (t === 'fav') carregarMinhaPlaylist();
else if (t === 'cloud') loadCloudinary();
else loadYoutube();
        }



async function carregarMinhaPlaylist(){
    await loadPlaylist();
    await loadFeedFavoritos();
}


function atualizarDados(){

    location.reload();

}


        async function loadLibrary() {
            try {
                const r = await fetch('/api/arquivos');
                const files = await r.json();
                document.getElementById('item-list').innerHTML = files.map(f => `
                    <div class="list-item">
                        <span onclick="copyCmd('${f}')">${f}</span>
                        <div class="item-actions">
                            <span class="btn-star" onclick="addToDB('${f}')">★</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) { document.getElementById('item-list').innerText = "Erro ao ler Render."; }
        }

        
async function loadCloudinarySimple() {
    try {
        const r = await fetch('/api/videos');
        const videos = await r.json();

        document.getElementById('item-list').innerHTML =
        videos.length ? videos.map(v => `
            <div class="list-item">
                <span onclick="copyCmd('${v.titulo || ''}')">
                    ${v.titulo || 'Vídeo'}
                </span>
                <div class="item-actions">
                    <span class="status-tag"
                    style="background:#00f2ff22;color:#00f2ff;">
                    CLOUD
                    </span>
                </div>
            </div>
        `).join('') :
        '<div style="text-align:center;padding:20px;">Nenhum vídeo Cloudinary.</div>';

    } catch(e) {
        document.getElementById('item-list').innerText =
        "Erro Cloudinary.";
    }
}

async function loadPlaylist() {
            if (!user) {
                document.getElementById('item-list').innerHTML = "<div style='text-align:center; padding:20px;'>Faça login.</div>";
                return;
            }

            // Pega arquivos no disco para comparar
            const r = await fetch('/api/arquivos');
            const localFiles = await r.json();

            db.ref(`playlists/${user.uid}`).on('value', snapshot => {
                const data = snapshot.val();
                if (!data) {
                    document.getElementById('item-list').innerHTML = "<div style='text-align:center; padding:20px;'>Vazia.</div>";
                    return;
                }
                const items = Object.values(data).filter((item, index, self) => index === self.findIndex(x => x.name === item.name));
                document.getElementById('item-list').innerHTML = items.map(item => {
                    const isLocal = localFiles.some(f => f.toLowerCase().includes(item.name.toLowerCase()));
                    return `
                        <div class="list-item" style="${isLocal ? '' : 'opacity: 0.7;'}">
                            <span onclick="copyCmd('${item.name}')">${item.name}</span>
                            <div class="item-actions">
                                <span class="status-tag" style="background: ${isLocal ? '#00f2ff22' : '#ff444422'}; color: ${isLocal ? '#00f2ff' : '#ff4444'};">
                                    ${isLocal ? 'DISCO' : 'NUVEM'}
                                </span>
                                <span class="btn-star active">★</span>
                                <span onclick="removerDaPlaylist('${Object.keys(data).find(k => data[k].name === item.name)}')" style="cursor:pointer;color:#ff4444;">
                                    🗑️
                                </span>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        


async function loadFeedFavoritos(){

    if(!user){
        document.getElementById("item-list").innerHTML =
        "Faça login para ver favoritos.";
        return;
    }

    try{

        const favSnap = await db
            .ref(`feed_favoritos`)
            .once("value");

        const favoritos = favSnap.val() || {};

        const meusFavoritos = Object.keys(favoritos)
            .filter(videoId => favoritos[videoId][user.uid]);

        const resposta = await fetch("/api/videos");
        const videos = await resposta.json();

        const lista = videos.filter(video =>
            meusFavoritos.includes(video.id || video.public_id)
        );

        document.getElementById("item-list").innerHTML =
        lista.map(video => `

            <div class="list-item">

                <span>${video.titulo}</span>

                <div class="item-actions">

                    <span class="btn-star active">
                    ⭐
                    </span>

                </div>

            </div>

        `).join("") || "Nenhum favorito do Feed.";

    }catch(e){

        console.error("Erro favoritos Feed:", e);
        document.getElementById("item-list").innerHTML =
        "Erro carregando favoritos.";

    }

}

async function loadYoutube(){

document.getElementById("item-list").style.display="none";
document.getElementById("cloud-list").style.display="none";
document.getElementById("youtube-list").style.display="flex";

try{

if(!user){
document.getElementById("youtube-list").innerHTML =
"Faça login para ver sua playlist YouTube.";
return;
}

db.ref(`playlists/${user.uid}`).once("value", snapshot=>{

const dados = snapshot.val() || {};

const videos = Object.values(dados)
.filter(v=>v.fonte==="youtube")
.slice(0,3);


document.getElementById("youtube-list").innerHTML =
videos.map(v=>`

<div class="video-card">

<b>${v.name}</b>

<iframe
width="100%"
height="130"
src="https://www.youtube.com/embed/${v.videoId}"
frameborder="0"
allowfullscreen>
</iframe>

<div class="video-actions">

<button onclick="copyCmd('${v.name}')">
▶️ Tocar
</button>

</div>

</div>

`).join("") || "Nenhum vídeo YouTube salvo.";

});


}catch(e){

document.getElementById("youtube-list").innerHTML =
"Erro YouTube.";

}

}


async function loadCloudinary(){

document.getElementById("item-list").style.display="none";
document.getElementById("cloud-list").style.display="flex";
document.getElementById("cloud-upload").style.display="block";

try{

const r = await fetch("/api/videos");
const videos = await r.json();

const primeiros =
videos.slice(0,3);

document.getElementById("cloud-list").innerHTML =
primeiros.map(v=>`

<div class="video-card">

<b>${v.titulo}</b>

<video controls src="${v.url}"></video>

<div class="video-actions">

<button onclick='addVideoPlaylist(${JSON.stringify(v)})'>
⭐ Playlist
</button>

<button onclick="deleteCloudVideo('${v.id}')">
🗑 Excluir
</button>

</div>

</div>

`).join("") || "Nenhum vídeo.";

}catch(e){

document.getElementById("cloud-list").innerHTML="Erro Cloudinary";

}

}


async function uploadCloudVideo(){

const file=document.getElementById("videoUpload").files[0];

if(!file)return alert("Selecione um vídeo");

const fd=new FormData();

fd.append("video",file);

await fetch("/api/videos/upload",{
method:"POST",
body:fd
});

loadCloudinary();

}


function addVideoPlaylist(video){

if(!user){
alert("Faça login");
return;
}

db.ref(`playlists/${user.uid}`).push({

name: video.titulo,
titulo: video.titulo,
url: video.url,
source: "cloudinary",
tipo: "video",
date: Date.now()

});

alert("Adicionado na playlist");

}


async function deleteCloudVideo(id){

if(!confirm("Excluir vídeo?")) return;

await fetch(`/api/videos/${id}`,{
 method:"DELETE"
});

loadCloudinary();

}

async function removerDaPlaylist(chave) {
    if (!user) return;

    await db.ref(`playlists/${user.uid}/${chave}`).remove();

    addMsg(`🗑️ Removida da playlist!`, 'ai');
}

function copyCmd(name) {
            document.getElementById('in').value = `tocar ${name}`;
            document.getElementById('in').focus();
        }

        async function addYoutubeToDB(video) {
    if (!user) return addMsg("Login necessário!", 'ai');

    const chave = video.name.replace(/[.#$\[\]\/]/g,'_');

    await db.ref(`playlists/${user.uid}/${chave}`).set({
        name: video.name,
        url: "https://www.youtube.com/watch?v=" + video.videoId,
        videoId: video.videoId,
        fonte: "youtube",
        tipo: "audio",
        date: Date.now()
    });

    addMsg(`⭐ ${video.name} salvo na playlist!`, 'ai');

    const btn = document.getElementById('btnYoutubePlaylist');
    if (btn) {
        btn.classList.add('salvo');
        btn.innerHTML = "✓ Adicionado";

        setTimeout(() => {
            btn.classList.remove('salvo');
            btn.innerHTML = "➕ Playlist";
        }, 2500);
    }
}

async function addToDB(name) {
            if (!user) return addMsg("Login necessário!", 'ai');
            await db.ref(`playlists/${user.uid}/${name.replace(/[.#$\[\]\/]/g,'_')}`).set({
                name: name,
                url: "/" + encodeURIComponent(name),
                date: Date.now()
            });
            addMsg(`⭐ ${name} salva no Firebase!`, 'ai');
        }

        let youtubeAtual = null;

function salvarYoutubeAtual() {
    if (!youtubeAtual) {
        addMsg("Nenhum vídeo YouTube carregado.", 'ai');
        return;
    }

    addYoutubeToDB(youtubeAtual);
}

async function send() {
            const input = document.getElementById('in');
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, 'user'); input.value = "";

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto: val, uid: user ? user.uid : null })
                });
                const data = await response.json();
                addMsg(data.nexus, 'ai');
                if(data.videoId) {

                    youtubeAtual = {
                        videoId: data.videoId,
                        name: data.titulo || data.videoId
                    };

                    document.getElementById('btnYoutubePlaylist').style.display = "block";

                    document.getElementById('track-info').innerText =
                        "YOUTUBE : " + data.videoId;

                    const audio =
                        document.getElementById('nexusPlayer');

                    audio.pause();
                    audio.style.display = "none";

                    const yt =
                        document.getElementById('youtubePlayer');

                    yt.style.display = "block";

                    if(window.nexusYT) {
                        window.nexusYT.loadVideoById(data.videoId);
                    } else {

                        window.nexusYT =
                            new YT.Player('youtubePlayer', {
                                height: '180',
                                width: '100%',
                                videoId: data.videoId,
                                playerVars: {
                                    autoplay: 1
                                }
                            });

                    }


                } else if(data.url) {

                    const yt =
                        document.getElementById('youtubePlayer');

                    yt.style.display = "none";

                    const nome =
                        data.titulo ||
                        decodeURIComponent(data.url).split('/').pop();

                    const video =
                        document.getElementById('nexusVideoPlayer');

                    const audio =
                        document.getElementById('nexusPlayer');

                    // yt duplicado removido

                    // Limpa estados anteriores dos players
                    audio.pause();
                    audio.removeAttribute('src');
                    audio.load();
                    audio.style.display = "none";

                    video.pause();
                    video.removeAttribute('src');
                    video.load();
                    video.style.display = "none";

                    if (yt) {
                        yt.style.display = "none";
                    }

                    if (window.nexusYT && typeof window.nexusYT.stopVideo === "function") {
                        window.nexusYT.stopVideo();
                    }

                    document.getElementById('track-info').innerText =
                        data.fonte.toUpperCase() + " : " + nome;


                    if (
                        data.url.toLowerCase().includes(".mp4") ||
                        data.fonte === "cloudinary"
                    ) {

                        audio.pause();
                        audio.style.display = "none";

                        video.style.display = "block";
                        video.src = data.url;
                        video.load();
                        video.play().catch(()=>{});

                    } else {

                        video.pause();
                        video.style.display = "none";

                        audio.style.display = "block";
                        audio.src = data.url;
                        audio.load();
                        audio.play().catch(()=>{});

                    }

                } else if(data.fonte) {

                    document.getElementById('track-info').innerText =
                        data.fonte.toUpperCase() + " : RESULTADO EXTERNO";

                }
                setTimeout(() => currentTab === 'lib' ? loadLibrary() : loadPlaylist(), 2000);
            } catch (e) { addMsg("Erro de conexão.", 'ai'); }
        }

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `bubble ${type}`;
            div.innerText = text;
            const h = document.getElementById('history');
            h.appendChild(div); h.scrollTop = h.scrollHeight;
        }

        document.getElementById('in').onkeydown = (e) => { if(e.key === 'Enter') send(); };
        loadLibrary();


function carregarMusicaInicial(){

    const audio = document.getElementById('nexusPlayer');

    if(audio){

        audio.src = "/Aline_Barros_-_Consagra__o___Louvor_ao_Rei__Ao_Vivo_.mp3";
        audio.load();

        document.getElementById('track-info').innerText =
            "NEXUS READY : Aline Barros";

    }

}

window.addEventListener("load", carregarMusicaInicial);


    </script>
